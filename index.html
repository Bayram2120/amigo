<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AmigoOPT - Магазин</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <header class="header">
            <div class="header-center">
                <img src="https://placehold.co/40x40/FFD700/000?text=LOGO" alt="Logo" class="logo">
                <h1 class="shop-title">AmigoOPT</h1>
            </div>
        </header>

        <!-- Поиск -->
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." class="search-input">
        </div>

        <!-- Основной контент -->
        <main id="mainContent" class="main-content">
            <!-- Здесь динамически загружается контент -->
        </main>

        <!-- Нижнее меню -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="shop">
                <span>🛍️</span>
                <span>Магазин</span>
            </button>
            <button class="nav-btn" data-page="sales">
                <span>🔥</span>
                <span>Акции</span>
            </button>
            <button class="nav-btn" data-page="cart">
                <span>🛒</span>
                <span>Корзина</span>
                <span id="cartBadge" class="cart-badge">0</span>
            </button>
            <button class="nav-btn" data-page="contacts">
                <span>📞</span>
                <span>Контакты</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
