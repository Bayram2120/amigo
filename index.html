<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>AmigoOPT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-center">
                <img src="https://sun9-1.userapi.com/s/v1/ig2/zPVlLn5vfjN9_o2eWlOwzOhwtBWlUN7b6K2r7UBS4lDzhTzZPHxq3hhUkGf6bj7aaoQzbZCY0VrvwpHwCGjGL2et.jpg?quality=95&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,1080x1080,1280x1280,1440x1440,2560x2560&from=bu&u=6NGR3ljDuBhK2h6_9_NkXFZeyiPGYY1iq6_AmmwMpWI&cs=2560x0" class="logo" alt="Logo">
                <h1 class="shop-title">AmigoOPT</h1>
            </div>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." class="search-input">
        </div>

        <main id="mainContent" class="main-content">
            <div style="text-align:center; padding:50px">Загрузка...</div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="shop">🛍️<span>Магазин</span></button>
            <button class="nav-btn" data-page="sales">🔥<span>Акции</span></button>
            <button class="nav-btn" data-page="cart">🛒<span>Корзина</span><span id="cartBadge" class="cart-badge">0</span></button>
            <button class="nav-btn" data-page="contacts">📞<span>Контакты</span></button>
        </nav>
    </div>

    <!-- Модальное окно для карточки товара -->
    <div id="modalOverlay" class="modal-overlay"></div>
    
    <!-- Модальное окно для формы оформления заказа -->
    <div id="checkoutModal" class="modal-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
